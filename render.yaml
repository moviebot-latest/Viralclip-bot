services:
  - type: web
    name: telegram-bot-api-server
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
    disk:
      name: bot-api-data
      mountPath: /data
      sizeGB: 1
